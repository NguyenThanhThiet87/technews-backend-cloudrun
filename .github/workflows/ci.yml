name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Job 1: Build và Push ảnh lên Registry
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      - name: Build Docker Image
        run: |
          docker build -t asia-southeast1-docker.pkg.dev/technews-500407/technews-repo/technews-api:${{ github.sha }} .

      - name: Push to Artifact Registry
        run: |
          docker push asia-southeast1-docker.pkg.dev/technews-500407/technews-repo/technews-api:${{ github.sha }}

  # Job 2: Deploy lên Cloud Run
  deploy:
    needs: build-and-push # <--- CHÌA KHÓA: Job này sẽ ĐỢI job trên chạy xong
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: 'technews-api'
          region: 'asia-southeast1'
          image: 'asia-southeast1-docker.pkg.dev/technews-500407/technews-repo/technews-api:${{ github.sha }}'