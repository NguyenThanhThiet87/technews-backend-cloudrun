name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # Bước 1: Lấy code từ repository về máy ảo của GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Xác thực với Google Cloud bằng Secret Key đã lưu
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      # Bước 3: Cấu hình Docker để nó hiểu cách làm việc với Artifact Registry
      - name: Configure Docker
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      # Bước 4: Build Docker Image (Sử dụng Multi-stage đã viết ở Day 3)
      - name: Build Docker Image
        run: |
          docker build -t asia-southeast1-docker.pkg.dev/technews-500407/technews-repo/technews-api:${{ github.sha }} .

      # Bước 5: Đẩy Image lên Artifact Registry
      - name: Push to Artifact Registry
        run: |
          docker push asia-southeast1-docker.pkg.dev/technews-500407/technews-repo/technews-api:${{ github.sha }}